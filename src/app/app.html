<div class="min-h-screen flex flex-col transition-colors duration-300">
  <!-- Nav Bar Header -->
  <header class="border-b border-zinc-200 dark:border-zinc-850/80 bg-white dark:bg-zinc-950 backdrop-blur-md sticky top-0 z-50 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <!-- Title -->
      <a routerLink="/" class="flex items-center gap-2 group">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-emerald-500 to-sky-500 flex items-center justify-center font-mono font-bold text-white text-base shadow shadow-emerald-500/20 group-hover:scale-105 transition-transform duration-200 select-none">
          D
        </div>
        <span class="text-base font-extrabold text-zinc-900 dark:text-white tracking-tight select-none">
          DevSight<span class="text-emerald-500 text-xs font-mono font-semibold ml-1">v21.0</span>
        </span>
      </a>

      <!-- Right Actions (Theme, Bookmarks indicators) -->
      <div class="flex items-center gap-3 font-mono">
        <!-- Favorites Badge Counter -->
        @if (favoritesCount > 0) {
          <a 
            routerLink="/" 
            class="px-2.5 py-1 text-[10px] sm:text-xs font-bold bg-amber-500/10 border border-amber-500/30 text-amber-500 rounded-lg flex items-center gap-1.5 hover:bg-amber-500/20 transition select-none"
            title="View bookmarked items"
          >
            <mat-icon class="scale-50 my-auto text-sm">star</mat-icon>
            <span class="leading-none my-auto">FAVORITES ({{ favoritesCount }})</span>
          </a>
        }

        <!-- Toggle Theme -->
        <button (click)="toolbox.toggleTheme()"
          class="p-2 border border-zinc-200 dark:border-zinc-800 rounded-xl bg-zinc-100 dark:bg-zinc-900 text-zinc-650 dark:text-zinc-350 hover:text-zinc-900 dark:hover:text-white transition cursor-pointer flex items-center justify-center"
          title="Toggle color scheme theme">
          @if (toolbox.theme() === 'dark') {
            <mat-icon class="scale-90 text-[18px]">wb_sunny</mat-icon>
          } @else {
            <mat-icon class="scale-90 text-[18px]">dark_mode</mat-icon>
          }
        </button>
      </div>
    </div>
  </header>

  <!-- Content Arena -->
  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-8">
    <router-outlet />
  </main>

  <!-- Static SEO Footer -->
  <footer class="border-t border-zinc-200 dark:border-zinc-850 bg-white dark:bg-zinc-950 py-8 text-xs font-mono text-zinc-500 dark:text-zinc-600 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="text-center md:text-left select-none text-[11px]">
        &copy; {{ year }} {{ siteName }}. All operations computed 100% client side. Zero-Server tracking.
      </div>
      <div class="flex flex-wrap items-center justify-center gap-x-4 gap-y-2 select-text text-[11px]">
        <a routerLink="/about" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition">About</a>
        <a routerLink="/contact" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition">Contact</a>
        <a routerLink="/privacy-policy" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition">Privacy</a>
        <a routerLink="/terms" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition">Terms</a>
        <a routerLink="/faq" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition">FAQs</a>
      </div>
    </div>
  </footer>
</div>
